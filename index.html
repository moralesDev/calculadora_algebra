<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Álgebra — Paso a Paso</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f4ef;
        --color-background-tertiary: #eeede8;
        --color-background-info: #e6f1fb;
        --color-background-danger: #fcebeb;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #5f5e5a;
        --color-text-tertiary: #888780;
        --color-text-info: #185fa5;
        --color-text-success: #0f6e56;
        --color-text-danger: #a32d2d;
        --color-border-tertiary: rgba(0,0,0,0.1);
        --color-border-secondary: rgba(0,0,0,0.2);
        --color-border-danger: #f09595;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'SFMono-Regular', Consolas, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1a1a18;
          --color-background-secondary: #242422;
          --color-background-tertiary: #2c2c2a;
          --color-background-info: #042c53;
          --color-background-danger: #501313;
          --color-text-primary: #f0efe9;
          --color-text-secondary: #b4b2a9;
          --color-text-tertiary: #888780;
          --color-text-info: #85b7eb;
          --color-text-success: #5dcaa5;
          --color-text-danger: #f09595;
          --color-border-tertiary: rgba(255,255,255,0.1);
          --color-border-secondary: rgba(255,255,255,0.2);
          --color-border-danger: #a32d2d;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
